<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Web App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="image/calculator.png" <!--Credits to iOS Flaticon-->
</head>
<body>
    <body class="light">
    <div class="calculator">
        <div class="top-bar">
            <span class="mode-label">Light Mode</span>
            <label class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
        </div>

        <input type="text" id="display" disabled>

        <div class="buttons">
            <!-- Top Row C, ⌫, %, / -->
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="clear" onclick="backspace()">⌫</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">/</button>

            <!-- 2nd Row -->
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>

            <!-- 3rd Row -->
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <!-- 4th Row -->
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <!-- Bottom Row -->
            <button onclick="appendValue('')" disabled></button>
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
